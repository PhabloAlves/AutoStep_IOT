services:
  mosquitto:
    image: eclipse-mosquitto:2
    entrypoint: ["sh", "/mosquitto/config/entrypoint.sh"]
    expose:
      - "1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/entrypoint.sh:/mosquitto/config/entrypoint.sh
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    environment:
      - MQTT_USER=${MQTT_USER:-autostep}
      - MQTT_PASSWORD=${MQTT_PASSWORD}

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - mosquitto
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - MQTT_USER=${MQTT_USER:-autostep}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - AUTOSTEP_SECRET_KEY=${AUTOSTEP_SECRET_KEY}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      - VITE_BACKEND_URL=http://backend:8000

volumes:
  mosquitto_data:
  mosquitto_log:
